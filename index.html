<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Model Görüntüleyici</title>
<!-- favicon -->
<link rel="icon" type="image/x-icon" href="favicon.ico">
<!-- model-viewer -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
background:#000;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
font-family:sans-serif;
}

model-viewer{
width:100%;
height:100%;
background:#000;
}

#arButton{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#00bfa6;
color:white;
border:none;
padding:14px 28px;
font-size:18px;
border-radius:10px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

#arButton:hover{
background:#009688;
}

.info{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:8px 12px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="info">
Model: model.glb
</div>

<model-viewer
id="model"
src="gltf-model="https://cdn.jsdelivr.net/gh/hasanyvz94-dev/maket.github.io@main/model.glb?v=2""
alt="3D Model"
ar
ar-placement="floor"
ar-modes="scene-viewer webxr"
camera-controls
auto-rotate
shadow-intensity="1"
environment-image="neutral"
exposure="1"
scale="0.2 0.2 0.2">
</model-viewer>

<button id="arButton">AR ile Görüntüle</button>

<script>

const modelViewer = document.getElementById("model");
const arButton = document.getElementById("arButton");

arButton.addEventListener("click", () => {

if(modelViewer.canActivateAR){

modelViewer.activateAR();

}else{

alert("AR bu cihazda desteklenmiyor.");

}

});

</script>

</body>
</html>
